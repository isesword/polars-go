syntax = "proto3";

package polars_bridge;

option go_package = "github.com/isesword/polars-go-bridge/proto";

// Plan 版本 v1
message Plan {
  uint32 plan_version = 1;  // 当前为 1
  Node root = 2;
}

// 节点定义
message Node {
  uint32 id = 1;
  oneof kind {
    MemoryScan memory_scan = 10;
    CsvScan csv_scan = 11;
    ParquetScan parquet_scan = 12;
    Project project = 13;
    Filter filter = 14;
    WithColumns with_columns = 15;
    Limit limit = 16;
    GroupBy group_by = 17;
    Join join = 18;
    Sort sort = 19;
    Unique unique = 20;
    Concat concat = 21;
    SqlQuery sql_query = 22;
  }

  reserved 50 to 99;   // window reserved
  reserved 100 to 149; // udf reserved
}

// Memory Scan（从输入 Arrow 读取）
message MemoryScan {
  repeated string column_names = 1;
  uint32 source_id = 2;
}

// CSV Scan（从 CSV 文件路径懒加载）
message CsvScan {
  string path = 1;  // 文件路径
  optional bool has_header = 2;
  optional uint32 separator = 3;
  optional uint64 skip_rows = 4;
  optional uint64 infer_schema_length = 5;
  optional string null_value = 6;
  optional bool try_parse_dates = 7;
  optional uint32 quote_char = 8;
  optional string comment_prefix = 9;
  map<string, DataType> schema = 10;
  optional CsvEncoding encoding = 11;
  optional bool ignore_errors = 12;
}

enum CsvEncoding {
  CSV_ENCODING_UTF8 = 0;
  CSV_ENCODING_LOSSY_UTF8 = 1;
}

// Parquet Scan（从 Parquet 文件路径懒加载）
message ParquetScan {
  string path = 1;  // 文件路径
  optional bool rechunk = 2;
}

// Project（选择列）
message Project {
  Node input = 1;
  repeated Expr expressions = 2;
}

// Filter（过滤）
message Filter {
  Node input = 1;
  Expr predicate = 2;
}

// WithColumns（添加/修改列）
message WithColumns {
  Node input = 1;
  repeated Expr expressions = 2;
}

// Limit（限制行数）
message Limit {
  Node input = 1;
  uint64 n = 2;
}

// GroupBy + Aggregation
message GroupBy {
  Node input = 1;
  repeated Expr keys = 2;
  repeated Expr aggs = 3;
}

enum JoinType {
  JOIN_INNER = 0;
  JOIN_LEFT = 1;
  JOIN_RIGHT = 2;
  JOIN_FULL = 3;
  JOIN_SEMI = 4;
  JOIN_ANTI = 5;
  JOIN_CROSS = 6;
}

message Join {
  Node left = 1;
  Node right = 2;
  repeated Expr left_on = 3;
  repeated Expr right_on = 4;
  JoinType how = 5;
  string suffix = 6;
}

message Sort {
  Node input = 1;
  repeated Expr by = 2;
  repeated bool descending = 3;
}

enum UniqueKeepStrategy {
  UNIQUE_KEEP_FIRST = 0;
  UNIQUE_KEEP_LAST = 1;
  UNIQUE_KEEP_ANY = 2;
  UNIQUE_KEEP_NONE = 3;
}

message Unique {
  Node input = 1;
  repeated string subset = 2;
  UniqueKeepStrategy keep = 3;
  bool maintain_order = 4;
}

message Concat {
  repeated Node inputs = 1;
  bool rechunk = 2;
  bool to_supertypes = 3;
  bool parallel = 4;
  bool diagonal = 5;
  bool maintain_order = 6;
}

message SqlQuery {
  string query = 1;
  repeated string table_names = 2;
  repeated Node inputs = 3;
}

// 表达式
message Expr {
  oneof kind {
    Column col = 1;
    Literal lit = 2;
    BinaryExpr binary = 3;
    Alias alias = 4;
    IsNull is_null = 5;
    Not not = 6;  // 逻辑取反
    Wildcard wildcard = 7;  // 通配符（选择所有列）
    Exclude exclude = 8;  // 排除列
    Cast cast = 9;  // 类型转换
    AggExpr sum = 10;
    AggExpr mean = 11;
    AggExpr min = 12;
    AggExpr max = 13;
    AggExpr count = 14;
    AggExpr first = 15;
    AggExpr last = 16;
    AggExpr len = 17;
    AggExpr n_unique = 18;
    AggExpr median = 19;
    AggExpr std = 20;
    AggExpr var = 21;
    Quantile quantile = 22;
    WhenThen when_then = 23;
    MapBatchesExpr map_batches = 24;
    Over over = 100;
    Rank rank = 101;
    CumSum cum_sum = 102;
    CumCount cum_count = 103;
    CumMin cum_min = 104;
    CumMax cum_max = 105;
    CumProd cum_prod = 106;
    Shift shift = 107;
    Diff diff = 108;
    TemporalUnary dt_year = 109;
    TemporalUnary dt_month = 110;
    TemporalUnary dt_day = 111;
    TemporalUnary dt_weekday = 112;
    TemporalParse str_to_date = 113;
    TemporalParse str_to_datetime = 114;
    TemporalUnary dt_hour = 115;
    TemporalUnary dt_minute = 116;
    TemporalUnary dt_second = 117;
    TemporalUnary dt_month_start = 118;
    TemporalUnary dt_month_end = 119;
    TemporalParse str_to_time = 120;
    
    // 字符串函数 (50-99)
    StringFunction str_len_bytes = 50;
    StringFunction str_len_chars = 51;
    StringContains str_contains = 52;
    StringStartsWith str_starts_with = 53;
    StringEndsWith str_ends_with = 54;
    StringExtract str_extract = 55;
    StringReplace str_replace = 56;
    StringReplace str_replace_all = 57;
    StringFunction str_to_lowercase = 58;
    StringFunction str_to_uppercase = 59;
    StringFunction str_to_titlecase = 60;
    StringStripChars str_strip_chars = 61;
    StringSlice str_slice = 62;
    StringSplit str_split = 63;
    StringPad str_pad_start = 64;
    StringPad str_pad_end = 65;
  }
  
  reserved 66 to 99;   // 预留更多字符串函数
  reserved 121 to 149; // more temporal/window functions reserved
}

// 列引用
message Column {
  string name = 1;
}

// 字面量
message Literal {
  oneof value {
    int64 int_val = 1;
    double float_val = 2;
    bool bool_val = 3;
    string string_val = 4;
    NullValue null_val = 5;
  }
}

message NullValue {}

// 二元表达式
message BinaryExpr {
  Expr left = 1;
  BinaryOperator op = 2;
  Expr right = 3;
}

message MapBatchesExpr {
  repeated Expr exprs = 1;
  uint64 udg_id = 2;
  DataType output_type = 3;
}

enum BinaryOperator {
  ADD = 0;
  SUB = 1;
  MUL = 2;
  DIV = 3;
  EQ = 4;
  NE = 5;
  LT = 6;
  LE = 7;
  GT = 8;
  GE = 9;
  AND = 10;
  OR = 11;
  MOD = 12;  // 取模运算 %
  POW = 13;  // 幂运算 **
  XOR = 14;  // 异或运算 ^
}

// 别名
message Alias {
  Expr expr = 1;
  string name = 2;
}

// 空值检查
message IsNull {
  Expr expr = 1;
}

// 逻辑取反
message Not {
  Expr expr = 1;
}

// 通配符（选择所有列）
message Wildcard {
  // 空消息，用于表示选择所有列
}

// 排除列
message Exclude {
  Expr expr = 1;  // 基础表达式（通常是 Wildcard）
  repeated string columns = 2;  // 要排除的列名
}

// 类型转换
message Cast {
  Expr expr = 1;  // 要转换的表达式
  DataType data_type = 2;  // 目标数据类型
  bool strict = 3;  // 严格模式（默认 true）
}

message AggExpr {
  Expr expr = 1;
}

enum QuantileMethod {
  QUANTILE_NEAREST = 0;
  QUANTILE_LOWER = 1;
  QUANTILE_HIGHER = 2;
  QUANTILE_MIDPOINT = 3;
  QUANTILE_LINEAR = 4;
  QUANTILE_EQUIPROBABLE = 5;
}

message Quantile {
  Expr expr = 1;
  double quantile = 2;
  QuantileMethod method = 3;
}

message WhenThen {
  Expr predicate = 1;
  Expr truthy = 2;
  Expr falsy = 3;
}

message Over {
  Expr expr = 1;
  repeated Expr partition_by = 2;
  repeated Expr order_by = 3;
  bool descending = 4;
  bool nulls_last = 5;
}

enum RankMethod {
  RANK_DENSE = 0;
  RANK_AVERAGE = 1;
  RANK_MIN = 2;
  RANK_MAX = 3;
  RANK_ORDINAL = 4;
}

message Rank {
  Expr expr = 1;
  RankMethod method = 2;
  bool descending = 3;
  optional uint64 seed = 4;
}

message CumSum {
  Expr expr = 1;
  bool reverse = 2;
}

message CumCount {
  Expr expr = 1;
  bool reverse = 2;
}

message CumMin {
  Expr expr = 1;
  bool reverse = 2;
}

message CumMax {
  Expr expr = 1;
  bool reverse = 2;
}

message CumProd {
  Expr expr = 1;
  bool reverse = 2;
}

message Shift {
  Expr expr = 1;
  int64 periods = 2;
}

enum DiffNullBehavior {
  DIFF_NULL_IGNORE = 0;
  DIFF_NULL_DROP = 1;
}

message Diff {
  Expr expr = 1;
  int64 periods = 2;
  DiffNullBehavior null_behavior = 3;
}

message TemporalUnary {
  Expr expr = 1;
}

message TemporalParse {
  Expr expr = 1;
  string format = 2;
}

// 数据类型
enum DataType {
  INT64 = 0;
  INT32 = 1;
  INT16 = 2;
  INT8 = 3;
  UINT64 = 4;
  UINT32 = 5;
  UINT16 = 6;
  UINT8 = 7;
  FLOAT64 = 8;
  FLOAT32 = 9;
  BOOL = 10;
  UTF8 = 11;  // String
  DATE = 12;
  DATETIME = 13;
  TIME = 14;
}

// ============ 字符串函数消息类型 ============

// 通用字符串函数（单一表达式）
message StringFunction {
  Expr expr = 1;
}

// 字符串包含检查
message StringContains {
  Expr expr = 1;
  string pattern = 2;
  bool literal = 3;  // true: 字面字符串, false: 正则表达式
}

// 字符串前缀检查
message StringStartsWith {
  Expr expr = 1;
  string prefix = 2;
}

// 字符串后缀检查
message StringEndsWith {
  Expr expr = 1;
  string suffix = 2;
}

// 字符串提取（正则）
message StringExtract {
  Expr expr = 1;
  string pattern = 2;
  uint32 group_index = 3;  // 捕获组索引
}

// 字符串替换
message StringReplace {
  Expr expr = 1;
  string pattern = 2;
  string value = 3;
  bool literal = 4;  // true: 字面字符串, false: 正则表达式
}

// 字符串修剪
message StringStripChars {
  Expr expr = 1;
  string chars = 2;  // 要移除的字符，空字符串表示移除空白字符
}

// 字符串切片
message StringSlice {
  Expr expr = 1;
  int64 offset = 2;  // 起始位置（可为负数）
  optional uint64 length = 3;  // 长度（可选）
}

// 字符串分割
message StringSplit {
  Expr expr = 1;
  string by = 2;  // 分隔符
}

// 字符串填充
message StringPad {
  Expr expr = 1;
  uint64 length = 2;  // 目标长度
  string fill_char = 3;  // 填充字符
}
