syntax = "proto3";

package polars_bridge;

option go_package = "github.com/isesword/polars-go/proto";

// Plan 版本 v1
message Plan {
  uint32 plan_version = 1;  // 当前为 1
  Node root = 2;
}

// 节点定义
message Node {
  uint32 id = 1;
  oneof kind {
    MemoryScan memory_scan = 10;
    CsvScan csv_scan = 11;
    ParquetScan parquet_scan = 12;
    Project project = 13;
    Filter filter = 14;
    WithColumns with_columns = 15;
    Limit limit = 16;
    GroupBy group_by = 17;
    Join join = 18;
    Sort sort = 19;
    Unique unique = 20;
    Concat concat = 21;
    SqlQuery sql_query = 22;
    Drop drop = 23;
    Rename rename = 24;
    Slice slice = 25;
    Explode explode = 26;
    DropNulls drop_nulls = 27;
    Unpivot unpivot = 28;
    Reverse reverse = 29;
    DropNans drop_nans = 30;
    FillNanFrame fill_nan = 31;
    Sample sample = 32;
    Unnest unnest = 33;
    Pivot pivot = 34;
  }

  reserved 50 to 99;   // window reserved
  reserved 100 to 149; // udf reserved
}

// Memory Scan（从输入 Arrow 读取）
message MemoryScan {
  repeated string column_names = 1;
  uint32 source_id = 2;
}

// CSV Scan（从 CSV 文件路径懒加载）
message CsvScan {
  string path = 1;  // 文件路径
  optional bool has_header = 2;
  optional uint32 separator = 3;
  optional uint64 skip_rows = 4;
  optional uint64 infer_schema_length = 5;
  optional string null_value = 6;
  optional bool try_parse_dates = 7;
  optional uint32 quote_char = 8;
  optional string comment_prefix = 9;
  map<string, DataType> schema = 10;
  optional CsvEncoding encoding = 11;
  optional bool ignore_errors = 12;
}

enum CsvEncoding {
  CSV_ENCODING_UTF8 = 0;
  CSV_ENCODING_LOSSY_UTF8 = 1;
}

// Parquet Scan（从 Parquet 文件路径懒加载）
message ParquetScan {
  string path = 1;  // 文件路径
  optional bool rechunk = 2;
}

// Project（选择列）
message Project {
  Node input = 1;
  repeated Expr expressions = 2;
}

// Filter（过滤）
message Filter {
  Node input = 1;
  Expr predicate = 2;
}

// WithColumns（添加/修改列）
message WithColumns {
  Node input = 1;
  repeated Expr expressions = 2;
}

// Limit（限制行数）
message Limit {
  Node input = 1;
  uint64 n = 2;
}

// GroupBy + Aggregation
message GroupBy {
  Node input = 1;
  repeated Expr keys = 2;
  repeated Expr aggs = 3;
}

enum JoinType {
  JOIN_INNER = 0;
  JOIN_LEFT = 1;
  JOIN_RIGHT = 2;
  JOIN_FULL = 3;
  JOIN_SEMI = 4;
  JOIN_ANTI = 5;
  JOIN_CROSS = 6;
}

message Join {
  Node left = 1;
  Node right = 2;
  repeated Expr left_on = 3;
  repeated Expr right_on = 4;
  JoinType how = 5;
  string suffix = 6;
}

message Sort {
  Node input = 1;
  repeated Expr by = 2;
  repeated bool descending = 3;
  repeated bool nulls_last = 4;
}

enum UniqueKeepStrategy {
  UNIQUE_KEEP_FIRST = 0;
  UNIQUE_KEEP_LAST = 1;
  UNIQUE_KEEP_ANY = 2;
  UNIQUE_KEEP_NONE = 3;
}

message Unique {
  Node input = 1;
  repeated string subset = 2;
  UniqueKeepStrategy keep = 3;
  bool maintain_order = 4;
}

message Concat {
  repeated Node inputs = 1;
  bool rechunk = 2;
  bool to_supertypes = 3;
  bool parallel = 4;
  bool diagonal = 5;
  bool maintain_order = 6;
}

message SqlQuery {
  string query = 1;
  repeated string table_names = 2;
  repeated Node inputs = 3;
}

message Drop {
  Node input = 1;
  repeated string columns = 2;
}

message Rename {
  Node input = 1;
  repeated string existing = 2;
  repeated string new = 3;
  bool strict = 4;
}

message Slice {
  Node input = 1;
  int64 offset = 2;
  uint64 len = 3;
}

message Explode {
  Node input = 1;
  repeated string columns = 2;
}

message DropNulls {
  Node input = 1;
  repeated string subset = 2;
}

message Unpivot {
  Node input = 1;
  repeated string on = 2;
  repeated string index = 3;
  string variable_name = 4;
  string value_name = 5;
}

message Reverse {
  Node input = 1;
}

message DropNans {
  Node input = 1;
  repeated string subset = 2;
}

message FillNanFrame {
  Node input = 1;
  Expr fill_value = 2;
}

message Sample {
  Node input = 1;
  bool is_fraction = 2;
  double value = 3;
  bool with_replacement = 4;
  bool shuffle = 5;
  optional uint64 seed = 6;
}

message Unnest {
  Node input = 1;
  repeated string columns = 2;
}

message PivotOnColumnRow {
  repeated Literal values = 1;
}

message Pivot {
  Node input = 1;
  repeated string on = 2;
  repeated PivotOnColumnRow on_columns = 3;
  repeated string index = 4;
  repeated string values = 5;
  string aggregate = 6;
  bool maintain_order = 7;
  string separator = 8;
}

// 表达式
message Expr {
  oneof kind {
    Column col = 1;
    Literal lit = 2;
    BinaryExpr binary = 3;
    Alias alias = 4;
    IsNull is_null = 5;
    IsNotNull is_not_null = 124;
    Not not = 6;  // 逻辑取反
    Wildcard wildcard = 7;  // 通配符（选择所有列）
    Exclude exclude = 8;  // 排除列
    Cast cast = 9;  // 类型转换
    AggExpr sum = 10;
    AggExpr mean = 11;
    AggExpr min = 12;
    AggExpr max = 13;
    AggExpr count = 14;
    AggExpr first = 15;
    AggExpr last = 16;
    AggExpr len = 17;
    AggExpr n_unique = 18;
    AggExpr median = 19;
    AggExpr std = 20;
    AggExpr var = 21;
    Quantile quantile = 22;
    WhenThen when_then = 23;
    MapBatchesExpr map_batches = 24;
    Over over = 100;
    Rank rank = 101;
    CumSum cum_sum = 102;
    CumCount cum_count = 103;
    CumMin cum_min = 104;
    CumMax cum_max = 105;
    CumProd cum_prod = 106;
    Shift shift = 107;
    Diff diff = 108;
    TemporalUnary dt_year = 109;
    TemporalUnary dt_month = 110;
    TemporalUnary dt_day = 111;
    TemporalUnary dt_weekday = 112;
    TemporalParse str_to_date = 113;
    TemporalParse str_to_datetime = 114;
    TemporalUnary dt_hour = 115;
    TemporalUnary dt_minute = 116;
    TemporalUnary dt_second = 117;
    TemporalUnary dt_month_start = 118;
    TemporalUnary dt_month_end = 119;
    TemporalParse str_to_time = 120;
    ForwardFill forward_fill = 121;
    FillNull fill_null = 122;
    BackwardFill backward_fill = 123;
    IsNan is_nan = 125;
    IsFinite is_finite = 126;
    Abs abs = 127;
    Round round = 128;
    Sqrt sqrt = 129;
    Log log = 130;
    Clip clip = 131;
    NullCount null_count = 132;
    ValueCounts value_counts = 133;
    ReverseExpr reverse = 134;
    FillNan fill_nan = 135;
    IsDuplicated is_duplicated = 136;
    Rolling rolling_min = 137;
    Rolling rolling_max = 138;
    Rolling rolling_mean = 139;
    Rolling rolling_sum = 140;
    FilterExpr filter_expr = 187;
    SortByExpr sort_by = 188;
    AsStruct as_struct = 189;
    Element element = 150;
    ConcatList concat_list = 151;
    ListEval list_eval = 152;
    ListFunction list_len = 153;
    ListFunction list_sum = 154;
    ListFunction list_max = 155;
    ListFunction list_min = 156;
    ListContains list_contains = 157;
    ListSort list_sort = 158;
    ListGet list_get = 159;
    ListAgg list_agg = 160;
    ListFunction list_mean = 161;
    ListFunction list_median = 162;
    ListMoment list_std = 163;
    ListMoment list_var = 164;
    ListFunction list_reverse = 165;
    ListUnique list_unique = 166;
    ListFunction list_n_unique = 167;
    ListSlice list_slice = 168;
    ListFunction list_arg_min = 169;
    ListFunction list_arg_max = 170;
    ListJoin list_join = 171;
    ListFunction list_any = 172;
    ListFunction list_all = 173;
    ListFunction list_drop_nulls = 174;
    ListShift list_shift = 175;
    ListDiff list_diff = 176;
    ListCountMatches list_count_matches = 177;
    ListGather list_gather = 178;
    ListGatherEvery list_gather_every = 179;
    ListSample list_sample_n = 180;
    ListSample list_sample_fraction = 181;
    ListSetOperation list_union = 182;
    ListSetOperation list_set_difference = 183;
    ListSetOperation list_set_intersection = 184;
    ListSetOperation list_set_symmetric_difference = 185;
    ListUnique list_unique_stable = 186;
    
    // 字符串函数 (50-99)
    StringFunction str_len_bytes = 50;
    StringFunction str_len_chars = 51;
    StringContains str_contains = 52;
    StringStartsWith str_starts_with = 53;
    StringEndsWith str_ends_with = 54;
    StringExtract str_extract = 55;
    StringReplace str_replace = 56;
    StringReplace str_replace_all = 57;
    StringFunction str_to_lowercase = 58;
    StringFunction str_to_uppercase = 59;
    StringFunction str_to_titlecase = 60;
    StringStripChars str_strip_chars = 61;
    StringSlice str_slice = 62;
    StringSplit str_split = 63;
    StringPad str_pad_start = 64;
    StringPad str_pad_end = 65;
    StringAffix str_strip_prefix = 66;
    StringAffix str_strip_suffix = 67;
    StringPattern str_extract_all = 68;
    StringContains str_count_matches = 69;
    StringReplaceN str_replace_n = 70;
  }
  
  reserved 71 to 99;   // 预留更多字符串函数
  reserved 141 to 149; // more temporal/window functions reserved
}

// 列引用
message Column {
  string name = 1;
}

// 字面量
message Literal {
  oneof value {
    int64 int_val = 1;
    double float_val = 2;
    bool bool_val = 3;
    string string_val = 4;
    NullValue null_val = 5;
  }
}

message NullValue {}

// 二元表达式
message BinaryExpr {
  Expr left = 1;
  BinaryOperator op = 2;
  Expr right = 3;
}

message MapBatchesExpr {
  repeated Expr exprs = 1;
  uint64 udg_id = 2;
  DataType output_type = 3;
}

enum BinaryOperator {
  ADD = 0;
  SUB = 1;
  MUL = 2;
  DIV = 3;
  EQ = 4;
  NE = 5;
  LT = 6;
  LE = 7;
  GT = 8;
  GE = 9;
  AND = 10;
  OR = 11;
  MOD = 12;  // 取模运算 %
  POW = 13;  // 幂运算 **
  XOR = 14;  // 异或运算 ^
}

// 别名
message Alias {
  Expr expr = 1;
  string name = 2;
}

// 空值检查
message IsNull {
  Expr expr = 1;
}

message IsNotNull {
  Expr expr = 1;
}

message IsNan {
  Expr expr = 1;
}

message IsFinite {
  Expr expr = 1;
}

// 逻辑取反
message Not {
  Expr expr = 1;
}

// 通配符（选择所有列）
message Wildcard {
  // 空消息，用于表示选择所有列
}

// 排除列
message Exclude {
  Expr expr = 1;  // 基础表达式（通常是 Wildcard）
  repeated string columns = 2;  // 要排除的列名
}

// 类型转换
message Cast {
  Expr expr = 1;  // 要转换的表达式
  DataType data_type = 2;  // 目标数据类型
  bool strict = 3;  // 严格模式（默认 true）
}

message AggExpr {
  Expr expr = 1;
}

enum QuantileMethod {
  QUANTILE_NEAREST = 0;
  QUANTILE_LOWER = 1;
  QUANTILE_HIGHER = 2;
  QUANTILE_MIDPOINT = 3;
  QUANTILE_LINEAR = 4;
  QUANTILE_EQUIPROBABLE = 5;
}

message Quantile {
  Expr expr = 1;
  double quantile = 2;
  QuantileMethod method = 3;
}

message WhenThen {
  Expr predicate = 1;
  Expr truthy = 2;
  Expr falsy = 3;
}

message Over {
  Expr expr = 1;
  repeated Expr partition_by = 2;
  repeated Expr order_by = 3;
  bool descending = 4;
  bool nulls_last = 5;
  WindowMapping mapping_strategy = 6;
}

enum WindowMapping {
  WINDOW_MAPPING_GROUP_TO_ROWS = 0;
  WINDOW_MAPPING_EXPLODE = 1;
  WINDOW_MAPPING_JOIN = 2;
}

enum RankMethod {
  RANK_DENSE = 0;
  RANK_AVERAGE = 1;
  RANK_MIN = 2;
  RANK_MAX = 3;
  RANK_ORDINAL = 4;
}

message Rank {
  Expr expr = 1;
  RankMethod method = 2;
  bool descending = 3;
  optional uint64 seed = 4;
}

message CumSum {
  Expr expr = 1;
  bool reverse = 2;
}

message CumCount {
  Expr expr = 1;
  bool reverse = 2;
}

message CumMin {
  Expr expr = 1;
  bool reverse = 2;
}

message CumMax {
  Expr expr = 1;
  bool reverse = 2;
}

message CumProd {
  Expr expr = 1;
  bool reverse = 2;
}

message Shift {
  Expr expr = 1;
  int64 periods = 2;
}

enum DiffNullBehavior {
  DIFF_NULL_IGNORE = 0;
  DIFF_NULL_DROP = 1;
}

message Diff {
  Expr expr = 1;
  int64 periods = 2;
  DiffNullBehavior null_behavior = 3;
}

message ForwardFill {
  Expr expr = 1;
  optional uint64 limit = 2;
}

message FillNull {
  Expr expr = 1;
  Expr fill_value = 2;
}

message BackwardFill {
  Expr expr = 1;
  optional uint64 limit = 2;
}

message Abs {
  Expr expr = 1;
}

message Round {
  Expr expr = 1;
  uint32 decimals = 2;
}

message Sqrt {
  Expr expr = 1;
}

message Log {
  Expr expr = 1;
  Expr base = 2;
}

message Clip {
  Expr expr = 1;
  Expr min = 2;
  Expr max = 3;
}

message NullCount {
  Expr expr = 1;
}

message ValueCounts {
  Expr expr = 1;
  bool sort = 2;
  bool parallel = 3;
  string name = 4;
  bool normalize = 5;
}

message ReverseExpr {
  Expr expr = 1;
}

message FillNan {
  Expr expr = 1;
  Expr fill_value = 2;
}

message IsDuplicated {
  Expr expr = 1;
}

message FilterExpr {
  Expr expr = 1;
  Expr predicate = 2;
}

message SortByExpr {
  Expr expr = 1;
  repeated Expr by = 2;
  repeated bool descending = 3;
  repeated bool nulls_last = 4;
}

message AsStruct {
  repeated Expr exprs = 1;
}

message Rolling {
  Expr expr = 1;
  uint64 window_size = 2;
  uint64 min_periods = 3;
  bool center = 4;
}

message Element {}

message ConcatList {
  repeated Expr exprs = 1;
}

message ListEval {
  Expr expr = 1;
  Expr evaluation = 2;
}

message ListFunction {
  Expr expr = 1;
}

message ListContains {
  Expr expr = 1;
  Expr item = 2;
  bool nulls_equal = 3;
}

message ListSort {
  Expr expr = 1;
  bool descending = 2;
  bool nulls_last = 3;
}

message ListGet {
  Expr expr = 1;
  Expr index = 2;
  bool null_on_oob = 3;
}

message ListAgg {
  Expr expr = 1;
  Expr evaluation = 2;
}

message ListMoment {
  Expr expr = 1;
  uint32 ddof = 2;
}

message ListUnique {
  Expr expr = 1;
  bool maintain_order = 2;
}

message ListSlice {
  Expr expr = 1;
  Expr offset = 2;
  Expr length = 3;
}

message ListJoin {
  Expr expr = 1;
  Expr separator = 2;
  bool ignore_nulls = 3;
}

message ListShift {
  Expr expr = 1;
  Expr periods = 2;
}

message ListDiff {
  Expr expr = 1;
  int64 periods = 2;
  DiffNullBehavior null_behavior = 3;
}

message ListCountMatches {
  Expr expr = 1;
  Expr element = 2;
}

message ListGather {
  Expr expr = 1;
  Expr index = 2;
  bool null_on_oob = 3;
}

message ListGatherEvery {
  Expr expr = 1;
  Expr n = 2;
  Expr offset = 3;
}

message ListSample {
  Expr expr = 1;
  Expr value = 2;
  bool with_replacement = 3;
  bool shuffle = 4;
  uint64 seed = 5;
  bool has_seed = 6;
}

enum SetOperation {
  UNION = 0;
  DIFFERENCE = 1;
  INTERSECTION = 2;
  SYMMETRIC_DIFFERENCE = 3;
}

message ListSetOperation {
  Expr expr = 1;
  Expr other = 2;
  SetOperation op = 3;
}

message TemporalUnary {
  Expr expr = 1;
}

message TemporalParse {
  Expr expr = 1;
  string format = 2;
}

// 数据类型
enum DataType {
  INT64 = 0;
  INT32 = 1;
  INT16 = 2;
  INT8 = 3;
  UINT64 = 4;
  UINT32 = 5;
  UINT16 = 6;
  UINT8 = 7;
  FLOAT64 = 8;
  FLOAT32 = 9;
  BOOL = 10;
  UTF8 = 11;  // String
  DATE = 12;
  DATETIME = 13;
  TIME = 14;
}

message RowsImportField {
  string name = 1;
  DataType dtype = 2;
  bool has_dtype = 3;
}

message RowsImportOptions {
  repeated RowsImportField schema_fields = 1;
  map<string, DataType> schema_overrides = 2;
  bool strict = 3;
  optional uint64 infer_schema_length = 4;
}

message RowStructField {
  string name = 1;
  RowValue value = 2;
}

message RowStruct {
  repeated RowStructField fields = 1;
}

message RowRecord {
  repeated RowValue values = 1;
}

message RowList {
  repeated RowValue values = 1;
}

message RowValue {
  oneof kind {
    NullValue null_val = 1;
    bool bool_val = 2;
    sint64 int_val = 3;
    uint64 uint_val = 4;
    double float_val = 5;
    string string_val = 6;
    bytes bytes_val = 7;
    sint32 date_val = 8;
    sint64 datetime_val = 9;
    sint64 time_val = 10;
    RowList list_val = 11;
    RowStruct struct_val = 12;
  }
}

message RowsPayload {
  repeated string row_order = 1;
  repeated RowRecord rows = 2;
  RowsImportOptions options = 3;
}

// ============ 字符串函数消息类型 ============

// 通用字符串函数（单一表达式）
message StringFunction {
  Expr expr = 1;
}

// 字符串包含检查
message StringContains {
  Expr expr = 1;
  string pattern = 2;
  bool literal = 3;  // true: 字面字符串, false: 正则表达式
}

// 字符串前缀检查
message StringStartsWith {
  Expr expr = 1;
  string prefix = 2;
}

// 字符串后缀检查
message StringEndsWith {
  Expr expr = 1;
  string suffix = 2;
}

// 字符串提取（正则）
message StringExtract {
  Expr expr = 1;
  string pattern = 2;
  uint32 group_index = 3;  // 捕获组索引
}

// 字符串替换
message StringReplace {
  Expr expr = 1;
  string pattern = 2;
  string value = 3;
  bool literal = 4;  // true: 字面字符串, false: 正则表达式
}

message StringReplaceN {
  Expr expr = 1;
  string pattern = 2;
  string value = 3;
  bool literal = 4;
  int64 n = 5;
}

message StringPattern {
  Expr expr = 1;
  string pattern = 2;
}

message StringAffix {
  Expr expr = 1;
  string value = 2;
}

// 字符串修剪
message StringStripChars {
  Expr expr = 1;
  string chars = 2;  // 要移除的字符，空字符串表示移除空白字符
}

// 字符串切片
message StringSlice {
  Expr expr = 1;
  int64 offset = 2;  // 起始位置（可为负数）
  optional uint64 length = 3;  // 长度（可选）
}

// 字符串分割
message StringSplit {
  Expr expr = 1;
  string by = 2;  // 分隔符
}

// 字符串填充
message StringPad {
  Expr expr = 1;
  uint64 length = 2;  // 目标长度
  string fill_char = 3;  // 填充字符
}
